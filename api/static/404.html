<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>404 Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        --bg: #0f172a;
        --card: #020617;
        --primary: #38bdf8;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #020617, #0f172a);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 48px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .code {
        font-size: 96px;
        font-weight: 800;
        color: var(--danger);
        margin: 0;
        line-height: 1;
      }

      h1 {
        font-size: 28px;
        margin: 16px 0 8px;
      }

      p {
        font-size: 16px;
        color: var(--muted);
        margin-bottom: 32px;
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      a {
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background: var(--primary);
        color: #020617;
      }

      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .btn-secondary {
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--text);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      @media (max-width: 480px) {
        .card {
          padding: 32px 24px;
        }

        .code {
          font-size: 72px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="code">404</div>
      <h1>Ruta no encontrada</h1>
      <p>
        La ruta que intentas acceder no existe o no está disponible en esta API.
      </p>

      <div class="actions">
        <a href="/login" class="btn-primary">Ir al Login</a>
        <a href="/" class="btn-secondary">Inicio</a>
      </div>
    </div>
  </body>
</html>
