<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login Backend</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #020617;
        --primary: #38bdf8;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #020617, #0f172a);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 48px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      form {
        font-size: 96px;
        font-weight: 800;
        color: var(--danger);
        margin: 0;
        line-height: 1;
      }
      h2 {
        font-size: 30px;
        margin: 16px 0 8px;
      }
      p {
        font-size: 20px;
        color: var(--text);
        margin-bottom: 16px;
      }
      input {
        display: block;
        margin: 10px auto;
        padding: 8px;
        width: 200px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--text);
        background-color: transparent;
      }
      button {
        border: 1px solid rgba(255, 255, 255, 0.15);
        background-color: transparent;
        color: var(--text);
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      @media (max-width: 480px) {
        .card {
          padding: 32px 24px;
        }
        form {
          font-size: 72px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Acceso al Backend</h2>
      <form id="loginForm">
        <p>Usuario:</p>
        <input type="text" id="username" placeholder="Usuario" required />
        <p>Contraseña:</p>
        <input
          type="password"
          id="password"
          placeholder="Contraseña"
          required
        />
        <button type="submit">Ingresar</button>
      </form>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        console.log(data);
        if (data.token) {
          localStorage.setItem("backend_token", data.token);
          alert("✅ Acceso autorizado");
          window.location.href = "/api/admin";
        } else {
          alert("❌ Usuario o contraseña incorrectos");
        }
      });
    </script>
  </body>
</html>
